<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pacific Sports — Review Order</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#fdfdfb;--bg:#f6f5f1;--ink:#1c1c1a;--soft-ink:#4c4a44;--faint:#8b8880;--line:#e7e4dc;--line-2:#d6d2c6;--accent:#3d5a40;--accent-soft:#eef1ec}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Geist','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  header{background:rgba(251,251,249,.9);border-bottom:1px solid var(--line);padding:18px 30px;display:flex;align-items:center;justify-content:space-between}
  header a.back{color:var(--accent);text-decoration:none;font-size:14px;font-weight:600}
  h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:34px}
  .wrap{max-width:920px;margin:30px auto;padding:0 18px}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin-bottom:16px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:10px;border-bottom:1px solid var(--line)}
  td input[type=number]{width:70px;padding:7px;border:1px solid var(--line-2);border-radius:7px;font-size:14px;text-align:center}
  .rm{border:none;background:none;color:#a8463f;cursor:pointer;font-size:13px}
  .whb{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px}
  .whb.SC{background:#e7eef5;color:#33414f}.whb.CA{background:#fdf3e2;color:#9a6b1f}
  .totals{display:flex;justify-content:space-between;align-items:center;font-size:15px}
  .totals b{font-size:22px}
  textarea{width:100%;min-height:80px;border:1px solid var(--line-2);border-radius:10px;padding:12px;font-family:inherit;font-size:14px;resize:vertical}
  .btn{background:var(--accent);color:#fff;border:none;padding:14px 30px;border-radius:10px;font-size:15.5px;font-weight:600;cursor:pointer;width:100%}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  #msg{display:none;margin-top:12px;padding:12px 16px;border-radius:10px;font-size:14px}
  .empty{padding:60px 20px;text-align:center;color:var(--faint)}
  .empty a{color:var(--accent)}
  .okbox{display:none;text-align:center;padding:50px 20px}
  .okbox h2{font-family:'Instrument Serif',serif;font-weight:400;font-size:30px;margin-bottom:10px}
  .okbox .ono{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:14px}
  .lock-note{background:var(--accent-soft);border:1px solid var(--line);border-radius:10px;padding:13px 16px;font-size:14px;color:var(--soft-ink);margin-bottom:16px}
</style>
</head>
<body>
<header>
  <a class="back" href="epacific-category.html">← Continue shopping</a>
  <h1>Review Order</h1>
  <span style="width:140px"></span>
</header>

<div class="wrap">
  <div class="lock-note" id="lockNote" style="display:none"></div>

  <div id="orderArea">
    <div class="panel">
      <table>
        <thead><tr><th>Style</th><th>Color</th><th>WH</th><th>Size</th><th>Qty</th><th></th></tr></thead>
        <tbody id="cartRows"></tbody>
      </table>
      <div class="empty" id="emptyMsg" style="display:none">Your order is empty. <a href="epacific-category.html">Browse styles →</a></div>
    </div>

    <div class="panel totals">
      <span>Total pieces</span>
      <b id="totalPcs">0</b>
    </div>

    <div class="panel">
      <label style="font-size:13px;font-weight:600;color:var(--soft-ink);display:block;margin-bottom:8px">Order notes (optional) — PO number, requested ship date, etc.</label>
      <textarea id="orderNotes" placeholder="e.g. PO #12345 · Please ship by Friday"></textarea>
    </div>

    <button class="btn" id="submitBtn">Submit order →</button>
    <div id="msg"></div>
  </div>

  <div class="okbox" id="okBox">
    <h2>Order received ✓</h2>
    <div class="ono" id="okNo"></div>
    <p style="color:var(--soft-ink);font-size:14.5px;line-height:1.7">We've received your order and will confirm availability and pricing shortly.<br>You'll hear from us by email.</p>
    <p style="margin-top:22px"><a href="epacific-category.html" style="color:var(--accent)">← Back to styles</a></p>
  </div>
</div>

<script src="pacific-config.js"></script>
<script src="pacific-admin-auth.js"></script>
<script>
  const _C=window.PACIFIC_CONFIG||{};
  const EMAIL_WORKER='https://shop-email.hjbae.workers.dev';
  function cartGet(){ try{return JSON.parse(localStorage.getItem('pacific_cart')||'[]');}catch(e){return [];} }
  function cartSet(c){ try{localStorage.setItem('pacific_cart',JSON.stringify(c));}catch(e){} }
  function session(){ try{return JSON.parse(sessionStorage.getItem('pacific_user')||'null');}catch(e){return null;} }
  function customer(){ try{return JSON.parse(sessionStorage.getItem('pacific_customer')||'null');}catch(e){return null;} }
  function esc(t){ return String(t).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

  function render(){
    const cart=cartGet();
    const body=document.getElementById('cartRows');
    const empty=document.getElementById('emptyMsg');
    const total=cart.reduce((s,i)=>s+(i.qty||0),0);
    document.getElementById('totalPcs').textContent=total;
    document.getElementById('submitBtn').disabled = total===0;
    if(!cart.length){ body.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';
    body.innerHTML=cart.map((i,idx)=>`
      <tr>
        <td><b>${esc(i.style)}</b><div style="font-size:12px;color:var(--faint)">${esc((i.styleName||'').replace(/^\d+\s*/,'')).slice(0,42)}</div></td>
        <td>${esc(i.color)}</td>
        <td><span class="whb ${i.wh}">${i.wh}</span></td>
        <td>${esc(i.size)}</td>
        <td><input type="number" min="0" value="${i.qty}" data-idx="${idx}"></td>
        <td><button class="rm" data-rm="${idx}">Remove</button></td>
      </tr>`).join('');
    body.querySelectorAll('input[data-idx]').forEach(inp=>inp.addEventListener('change',()=>{
      const c=cartGet(); const q=parseInt(inp.value)||0;
      if(q<=0) c.splice(parseInt(inp.dataset.idx),1); else c[parseInt(inp.dataset.idx)].qty=q;
      cartSet(c); render();
    }));
    body.querySelectorAll('button[data-rm]').forEach(b=>b.addEventListener('click',()=>{
      const c=cartGet(); c.splice(parseInt(b.dataset.rm),1); cartSet(c); render();
    }));
  }

  async function init(){
    render();
    // 권한: 승인된 거래처(또는 직원)만 제출 가능
    const s=session();
    const note=document.getElementById('lockNote');
    if(!s||!s.token){
      note.style.display='block';
      note.innerHTML='🔒 <a href="epacific-login.html?next='+encodeURIComponent('epacific-cart.html')+'" style="color:var(--accent);font-weight:700">Log in</a> with an approved wholesale account to submit this order. Your items are saved.';
      document.getElementById('submitBtn').disabled=true;
      return;
    }
    // 직원이면 통과, 아니면 신청 상태 확인
    let allowed=false;
    try{ const st=await PacificAuth.currentStaff(); if(st) allowed=true; }catch(e){}
    if(!allowed){
      try{
        const r=await fetch(_C.SUPABASE_URL+'/rest/v1/customer_applications?user_id=eq.'+s.userId+'&select=status,company_name,contact_name,phone',
          {headers:{apikey:_C.SUPABASE_ANON_KEY,Authorization:'Bearer '+s.token}});
        if(r.ok){ const rows=await r.json();
          if(rows&&rows[0]&&rows[0].status==='approved'){ allowed=true; sessionStorage.setItem('pacific_customer',JSON.stringify(rows[0])); }
          else if(rows&&rows[0]){ note.style.display='block'; note.textContent='🔒 Your wholesale account is pending approval — you can submit orders once approved.'; }
          else { note.style.display='block'; note.innerHTML='🔒 No wholesale account found. <a href="epacific-login.html?pane=reg" style="color:var(--accent);font-weight:700">Apply here</a>.'; }
        }
      }catch(e){}
    }
    if(!allowed) document.getElementById('submitBtn').disabled=true;
  }

  async function submitOrder(){
    const cart=cartGet();
    const total=cart.reduce((s,i)=>s+(i.qty||0),0);
    if(total===0) return;
    const s=session(); if(!s){ return; }
    const cust=customer()||{};
    const btn=document.getElementById('submitBtn');
    btn.disabled=true; btn.textContent='Submitting…';
    const d=new Date();
    const ono='WEB-'+d.getFullYear().toString().slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'-'+Math.random().toString(36).slice(2,6).toUpperCase();
    try{
      const r=await fetch(_C.SUPABASE_URL+'/rest/v1/web_orders',{
        method:'POST',
        headers:{apikey:_C.SUPABASE_ANON_KEY,Authorization:'Bearer '+s.token,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({
          order_number:ono, user_id:s.userId, email:s.email,
          company_name:cust.company_name||null, contact_name:cust.contact_name||null, phone:cust.phone||null,
          items:cart, total_pcs:total,
          notes:document.getElementById('orderNotes').value.trim()||null,
          status:'new'
        })
      });
      if(!r.ok){ const t=await r.text(); throw new Error(t.slice(0,140)); }
      // 확인 이메일 (거래처 + 사장님 알림) — 실패해도 주문은 유지
      if(EMAIL_WORKER){
        fetch(EMAIL_WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({type:'order',to:s.email,data:{
            order_number:ono,total_pcs:total,items:cart,
            notes:document.getElementById('orderNotes').value.trim()||null,
            company_name:cust.company_name||null,contact_name:cust.contact_name||null,phone:cust.phone||null
          }})}).catch(()=>{});
      }
      cartSet([]);
      document.getElementById('orderArea').style.display='none';
      document.getElementById('okBox').style.display='block';
      document.getElementById('okNo').textContent='Order '+ono;
    }catch(e){
      const m=document.getElementById('msg');
      m.style.display='block'; m.style.background='#f8ecea'; m.style.color='#a8463f'; m.style.border='1px solid #ecd6d3';
      m.textContent='Could not submit: '+e.message;
      btn.disabled=false; btn.textContent='Submit order →';
    }
  }

  document.getElementById('submitBtn').addEventListener('click',submitOrder);
  init();
</script>
</body>
</html>
