<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pacific Sports — Customers</title>
<style>
  :root{--paper:#fdfdfb;--ink:#1c1c1a;--soft-ink:#4c4a44;--faint:#8b8880;--line:#e7e4dc;--line-2:#d6d2c6;--accent:#3d5a40;--accent-soft:#eef1ec}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Avenir Next','Segoe UI',system-ui,sans-serif;background:#f6f5f1;color:var(--ink);padding:30px 16px}
  .wrap{max-width:1000px;margin:0 auto}
  h1{font-size:24px;margin-bottom:4px}
  .sub{color:var(--faint);font-size:14px;margin-bottom:22px}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tabs button{border:1px solid var(--line-2);background:var(--paper);padding:8px 18px;border-radius:999px;cursor:pointer;font-size:13.5px;color:var(--soft-ink)}
  .tabs button.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .card .info{flex:1;min-width:240px}
  .company{font-weight:700;font-size:16px}
  .meta{color:var(--soft-ink);font-size:13.5px;margin-top:3px;line-height:1.6}
  .badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px}
  .badge.pending{background:#fdf3e2;color:#9a6b1f}
  .badge.approved{background:var(--accent-soft);color:var(--accent)}
  .badge.rejected{background:#f8ecea;color:#a8463f}
  .acts{display:flex;gap:8px}
  .acts button{border:none;padding:9px 18px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600}
  .approve{background:var(--accent);color:#fff}
  .reject{background:#f1efe9;color:var(--soft-ink)}
  #msg{padding:30px;text-align:center;color:var(--faint)}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .top a{color:var(--accent);font-size:13.5px;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Customers</h1>
    <a href="epacific-timeless.html">← Back to site</a>
  </div>
  <div class="sub">Review wholesale account applications. Approved customers can log in and see pricing.</div>
  <div class="tabs">
    <button id="tabPending" class="on">Pending</button>
    <button id="tabApproved">Approved</button>
    <button id="tabRejected">Rejected</button>
  </div>
  <div id="list"></div>
  <div id="msg">Loading…</div>
</div>

<script src="pacific-config.js"></script>
<script src="pacific-admin-auth.js"></script>
<script>
  const _C=window.PACIFIC_CONFIG||{};
  const URL_=_C.SUPABASE_URL, KEY_=_C.SUPABASE_ANON_KEY;
  // AI 서류 검토 Worker 주소
  const CERT_AI_WORKER='https://cert-check.hjbae.workers.dev';
  // 이메일 발송 Worker 주소
  const EMAIL_WORKER='https://shop-email.hjbae.workers.dev';
  let view='pending', rows=[], customers=[];

  function session(){ try{return JSON.parse(localStorage.getItem('pacific_user')||'null');}catch(e){return null;} }

  async function load(){
    const s=session();
    if(!s||!s.token){
      document.getElementById('msg').innerHTML='Please <a href="epacific-login.html?next='+encodeURIComponent('admin-customers.html')+'">log in as staff</a> first.';
      return;
    }
    // 직원(owner/accounting/sales)만 — 거래처 차단
    try{
      const st=await PacificAuth.currentStaff();
      if(!st){ document.getElementById('msg').textContent='This page is for Pacific Sports staff only.'; return; }
    }catch(e){ document.getElementById('msg').textContent='Could not verify staff access.'; return; }
    const r=await fetch(URL_+'/rest/v1/customer_applications?select=*&order=created_at.desc',
      {headers:{apikey:KEY_,Authorization:'Bearer '+s.token}});
    if(!r.ok){ document.getElementById('msg').textContent='Could not load applications ('+r.status+'). Make sure you are logged in as staff.'; return; }
    rows=await r.json();
    // IMS 거래처 목록 (가격 연결용 드롭다운)
    try{
      const cr=await fetch(URL_+'/rest/v1/customers?select=id,name,customer_no&order=name&limit=5000',
        {headers:{apikey:KEY_,Authorization:'Bearer '+s.token}});
      if(cr.ok) customers=await cr.json();
    }catch(e){ customers=[]; }
    render();
  }

  function _money(n){ return String.fromCharCode(36) + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  async function toggleOrders(id, email){
    var p=document.getElementById('op-'+id); if(!p) return;
    if(p.style.display!=='none'){ p.style.display='none'; return; }
    p.style.display='block';
    if(p.dataset.loaded){ return; }
    if(!email){ p.innerHTML="<div style='color:#8b8880;font-size:13px;padding:6px 0'>No email on file.</div>"; p.dataset.loaded='1'; return; }
    p.innerHTML="<div style='color:#8b8880;font-size:13px;padding:6px 0'>Loading orders...</div>";
    var s=session(); if(!s){ p.innerHTML="<div style='color:#a8463f'>Session expired.</div>"; return; }
    try{
      var qs='/rest/v1/web_orders?email=eq.'+encodeURIComponent(email)+'&order=created_at.desc&select=order_number,created_at,total_amount,status,carrier,tracking_number,items,ship_to';
      var rr=await fetch(URL_+qs, {headers:{apikey:KEY_,Authorization:'Bearer '+s.token}});
      if(!rr.ok){ p.innerHTML="<div style='color:#a8463f;font-size:13px;padding:6px 0'>Could not load orders ("+rr.status+").</div>"; p.dataset.loaded='1'; return; }
      var orders=await rr.json();
      p.innerHTML=renderOrders(orders);
      p.dataset.loaded='1';
    }catch(e){ p.innerHTML="<div style='color:#a8463f;font-size:13px;padding:6px 0'>Error: "+esc(e.message)+"</div>"; }
  }
  function renderOrders(orders){
    if(!orders||!orders.length) return "<div style='color:#8b8880;font-size:13px;padding:6px 0'>No orders yet.</div>";
    var head="<div style='font-size:11px;font-weight:700;letter-spacing:.08em;color:#8b8880;margin:10px 0 6px'>ORDER HISTORY ("+orders.length+")</div>";
    var body=orders.map(function(o){
      var items=Array.isArray(o.items)?o.items:[];
      var il=items.map(function(i){ return esc(i.style)+" "+esc(i.color||'')+" "+esc(i.size||'')+" x"+(i.qty||0); }).join(", ");
      var st=o.ship_to||{};
      var shipTo=[st.city,st.state].filter(Boolean).join(', ');
      var trk=o.tracking_number?String(o.tracking_number).split(String.fromCharCode(10)).join(', '):'';
      return "<div style='border:1px solid #e7e4dc;border-radius:9px;padding:9px 12px;margin-bottom:6px;font-size:13px'>"
        + "<div style='display:flex;justify-content:space-between;gap:8px'><b>"+esc(o.order_number||'')+"</b><span style='color:#8b8880'>"+String(o.created_at||'').slice(0,10)+"</span></div>"
        + "<div style='color:#4c4a44;margin-top:3px'>"+_money(o.total_amount)+" &middot; <span style='text-transform:uppercase;font-size:10.5px;background:#eef1ec;color:#3d5a40;border-radius:999px;padding:2px 8px'>"+esc(o.status||'')+"</span>"+(o.carrier?" &middot; "+esc(o.carrier):'')+(trk?" &middot; "+esc(trk):'')+(shipTo?" &middot; "+esc(shipTo):'')+"</div>"
        + (il?"<div style='color:#8b8880;margin-top:3px;font-size:12px'>"+il+"</div>":'')
        + "</div>";
    }).join("");
    return head+body;
  }
  function render(){
    const list=document.getElementById('list'); const msg=document.getElementById('msg');
    const show = rows.filter(r=> view==='pending' ? (r.status==='pending'||!r.status) : view==='approved' ? r.status==='approved' : view==='rejected' ? r.status==='rejected' : true);
    if(!show.length){ list.innerHTML=''; msg.style.display='block'; msg.textContent = view==='pending' ? 'No pending applications. 🎉' : (view==='approved'?'No approved customers yet.':view==='rejected'?'No rejected applications.':'No applications yet.'); return; }
    msg.style.display='none';
    list.innerHTML=show.map(r=>`
      <div class="card">
        <div class="info">
          <div class="company">${esc(r.company_name||'(no name)')}</div>
          <div class="meta">
            ${esc(r.contact_name||'')} · ${esc(r.email||'')} · ${esc(r.phone||'')}<br>
            Tax ID: ${esc(r.resale_tax_id||'—')} · Warehouse: ${esc(r.primary_warehouse||'—')} · Applied: ${(r.created_at||'').slice(0,10)}
          </div>
        </div>
        <span class="badge ${r.status}">${r.status}</span>
        <div class="acts">
          ${r.tax_doc_path?`<button class="reject" data-doc="${esc(r.tax_doc_path)}">View certificate</button>`:''}
          ${r.tax_doc_path?`<button class="reject" data-ai="${r.id}">🤖 AI check</button>`:''}
          ${r.status!=='approved'?`<button class="approve" data-id="${r.id}" data-act="approved">Approve</button>`:''}
          ${r.status!=='rejected'?`<button class="reject" data-id="${r.id}" data-act="rejected">Reject</button>`:''}
        </div>
        ${aiBadge(r.ai_check)}
        ${linkRow(r)}
        <button data-orders="${esc(r.email||'')}" data-cid="${r.id}" style="margin-top:8px;border:1px solid var(--line-2,#d6d2c6);background:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--soft-ink,#4c4a44)">▾ Orders &amp; details</button>
        <div class="orderpanel" id="op-${r.id}" style="display:none;margin-top:8px"></div>
      </div>`).join('');
    list.querySelectorAll('button[data-id]').forEach(b=>b.addEventListener('click',()=>setStatus(b.dataset.id,b.dataset.act)));
    list.querySelectorAll('button[data-doc]').forEach(b=>b.addEventListener('click',()=>viewDoc(b.dataset.doc)));
    list.querySelectorAll('button[data-ai]').forEach(b=>b.addEventListener('click',()=>aiCheck(b.dataset.ai,b)));
    list.querySelectorAll('select[data-link]').forEach(sel=>sel.addEventListener('change',()=>linkCustomer(sel.dataset.link,sel.value,sel)));
  }

  // AI 검토 결과 배지
  function aiBadge(ai){
    if(!ai) return '';
    if(ai.error) return `<div style="margin-top:10px;background:#f8ecea;color:#a8463f;border-radius:9px;padding:9px 13px;font-size:13.5px">🤖 AI check failed: ${esc(ai.error)}</div>`;
    const v=ai.verdict||'warn';
    const bg = v==='pass' ? 'var(--accent-soft)' : v==='fail' ? '#f8ecea' : '#fdf3e2';
    const fg = v==='pass' ? 'var(--accent)' : v==='fail' ? '#a8463f' : '#9a6b1f';
    const icon = v==='pass' ? '✓' : v==='fail' ? '✗' : '⚠';
    const detail=[
      ai.company_on_doc?('Doc company: '+esc(ai.company_on_doc)):null,
      ai.tax_id_on_doc?('ID: '+esc(ai.tax_id_on_doc)):null,
      ai.state?('State: '+esc(ai.state)):null,
      ai.expiration?('Expires: '+esc(ai.expiration)):null
    ].filter(Boolean).join(' · ');
    return `<div style="margin-top:10px;background:${bg};color:${fg};border-radius:9px;padding:9px 13px;font-size:13.5px">
      <b>🤖 ${icon} ${v.toUpperCase()}</b> — ${esc(ai.summary||'')}
      ${detail?('<div style="margin-top:3px;font-size:12.5px;opacity:.85">'+detail+'</div>'):''}
    </div>`;
  }

  // AI 서류 검토: 서명 링크 만들어 Worker로 보내고 결과 저장
  async function aiCheck(id,btn){
    if(!CERT_AI_WORKER){ alert('AI check worker is not set up yet.'); return; }
    const r=rows.find(x=>x.id===id); if(!r||!r.tax_doc_path) return;
    const s=session(); if(!s){ alert('Session expired.'); return; }
    const orig=btn.textContent; btn.disabled=true; btn.textContent='🤖 Checking…';
    try{
      // 1) 서류 서명 링크 (1시간)
      const sr=await fetch(URL_+'/storage/v1/object/sign/customer-docs/'+encodeURI(r.tax_doc_path),
        {method:'POST',headers:{apikey:KEY_,Authorization:'Bearer '+s.token,'Content-Type':'application/json'},
         body:JSON.stringify({expiresIn:3600})});
      if(!sr.ok) throw new Error('Could not access the document ('+sr.status+')');
      const sd=await sr.json();
      const fileUrl=URL_+'/storage/v1'+sd.signedURL;
      // 2) Worker 호출
      const wr=await fetch(CERT_AI_WORKER,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({fileUrl,company_name:r.company_name,resale_tax_id:r.resale_tax_id,contact_name:r.contact_name})
      });
      const result=await wr.json();
      // 3) 결과 저장 + 표시
      r.ai_check=result;
      await fetch(URL_+'/rest/v1/customer_applications?id=eq.'+id,
        {method:'PATCH',headers:{apikey:KEY_,Authorization:'Bearer '+s.token,'Content-Type':'application/json','Prefer':'return=minimal'},
         body:JSON.stringify({ai_check:result})});
      render();
    }catch(e){
      alert('AI check failed: '+e.message);
      btn.disabled=false; btn.textContent=orig;
    }
  }

  // ── IMS 거래처 연결 (거래처별 가격의 연결고리: customer_applications.customer_id) ──
  function linkRow(r){
    if(!customers.length) return '';
    const opts=['<option value="">— IMS 거래처 연결 안 됨 (기본가 적용) —</option>']
      .concat(customers.map(c=>`<option value="${c.id}" ${c.id===r.customer_id?'selected':''}>${esc(c.name)}${c.customer_no?(' ('+esc(c.customer_no)+')'):''}</option>`));
    return `<div style="flex-basis:100%;margin-top:10px;display:flex;align-items:center;gap:10px">
      <span style="font-size:12.5px;color:var(--faint);white-space:nowrap">IMS customer:</span>
      <select data-link="${r.id}" style="flex:1;max-width:420px;padding:7px 10px;border:1px solid var(--line-2);border-radius:8px;background:#fff;font-size:13px;color:var(--soft-ink)">${opts.join('')}</select>
      <span class="linkmsg" style="font-size:12.5px;color:var(--accent)"></span>
    </div>`;
  }
  async function linkCustomer(appId,customerId,sel){
    const s=session(); if(!s){ alert('Session expired.'); return; }
    sel.disabled=true;
    const r=await fetch(URL_+'/rest/v1/customer_applications?id=eq.'+appId,
      {method:'PATCH',headers:{apikey:KEY_,Authorization:'Bearer '+s.token,'Content-Type':'application/json','Prefer':'return=minimal'},
       body:JSON.stringify({customer_id: customerId||null})});
    sel.disabled=false;
    const msg=sel.parentElement.querySelector('.linkmsg');
    if(!r.ok){ msg.style.color='#a8463f'; msg.textContent='Save failed ('+r.status+')'; return; }
    const row=rows.find(x=>x.id===appId); if(row) row.customer_id=customerId||null;
    msg.style.color='var(--accent)'; msg.textContent='Saved ✓'; setTimeout(()=>{msg.textContent='';},2000);
  }

  // 비공개 서류 → 1시간짜리 서명 링크 만들어 새 탭으로
  async function viewDoc(path){
    const s=session(); if(!s){ alert('Session expired.'); return; }
    const r=await fetch(URL_+'/storage/v1/object/sign/customer-docs/'+encodeURI(path),
      {method:'POST',headers:{apikey:KEY_,Authorization:'Bearer '+s.token,'Content-Type':'application/json'},
       body:JSON.stringify({expiresIn:3600})});
    if(!r.ok){ alert('Could not open the document ('+r.status+').'); return; }
    const d=await r.json();
    if(d.signedURL) window.open(URL_+'/storage/v1'+d.signedURL,'_blank');
  }

  async function setStatus(id,status){
    const s=session(); if(!s){ alert('Session expired.'); return; }
    const body={status}; if(status==='approved') body.approved_at=new Date().toISOString();
    const r=await fetch(URL_+'/rest/v1/customer_applications?id=eq.'+id,
      {method:'PATCH',headers:{apikey:KEY_,Authorization:'Bearer '+s.token,'Content-Type':'application/json','Prefer':'return=minimal'},
       body:JSON.stringify(body)});
    if(!r.ok){ alert('Could not save ('+r.status+').'); return; }
    const row=rows.find(x=>x.id===id); if(row) row.status=status;
    // 승인이면 거래처에게 승인 이메일 (실패해도 승인 자체는 유지)
    if(status==='approved' && row && row.email && EMAIL_WORKER){
      fetch(EMAIL_WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({type:'approval',to:row.email,data:{company_name:row.company_name,contact_name:row.contact_name}})})
        .then(res=>res.ok?null:console.warn('approval email failed'))
        .catch(()=>console.warn('approval email failed'));
    }
    render();
  }

  function esc(t){ return String(t).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

  document.getElementById('tabPending').addEventListener('click',()=>{view='pending';tab();render();});
  document.getElementById('tabApproved').addEventListener('click',()=>{view='approved';tab();render();});
  document.getElementById('tabRejected').addEventListener('click',()=>{view='rejected';tab();render();});
  document.getElementById('list').addEventListener('click',function(e){ var b=e.target.closest&&e.target.closest('button[data-orders]'); if(b){ toggleOrders(b.dataset.cid, b.dataset.orders); } });
  function tab(){
    document.getElementById('tabPending').classList.toggle('on',view==='pending');
    document.getElementById('tabApproved').classList.toggle('on',view==='approved');
    document.getElementById('tabRejected').classList.toggle('on',view==='rejected');
  }
  load();
</script>
</body>
<!-- v2026-06-06 price-system -->
</html>
