<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacific Sports — 관리자 로그인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbfbf9;--paper:#ffffff;--ink:#1c1c1a;--soft-ink:#56564f;--faint:#8e8e85;
    --line:#e8e7e1;--line-2:#deded6;--accent:#3d5a40;--accent-soft:#eef1ec;--err:#a8463f;
    --display:'Instrument Serif',Georgia,serif;--body:'Geist','Helvetica Neue',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--body);color:var(--ink);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  .box{width:100%;max-width:360px;padding:30px}
  .logo-img{height:42px;margin:0 auto 26px;display:block}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:34px 28px;box-shadow:0 30px 60px -40px rgba(28,28,26,.3)}
  h1{font-family:var(--display);font-weight:400;font-size:26px;text-align:center;margin-bottom:6px}
  .sub{text-align:center;font-size:13.5px;color:var(--faint);margin-bottom:24px}
  .dots{display:flex;gap:14px;justify-content:center;margin-bottom:22px}
  .dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--line-2);transition:.15s}
  .dot.filled{background:var(--accent);border-color:var(--accent)}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .pad button{font-family:var(--body);font-size:22px;font-weight:500;padding:16px 0;border:1px solid var(--line);border-radius:12px;background:var(--paper);color:var(--ink);cursor:pointer;transition:.12s}
  .pad button:hover{border-color:var(--accent);background:var(--accent-soft)}
  .pad button:active{transform:scale(.96)}
  .pad button.fn{font-size:14px;color:var(--soft-ink);border-color:transparent;background:transparent}
  .err{background:#f8ecea;color:var(--err);border:1px solid #ecd6d3;border-radius:10px;padding:11px 14px;font-size:13.5px;margin-bottom:18px;display:none;text-align:center}
  .err.show{display:block}
  .foot{text-align:center;font-size:12.5px;color:var(--faint);margin-top:20px;line-height:1.6}
  .foot a{color:var(--accent)}
</style>
</head>
<body>
<div class="box">
  <img src="logo-pacific.png" alt="Pacific Sports" class="logo-img">
  <div class="card">
    <h1>관리자 로그인</h1>
    <div class="sub">IMS에서 쓰는 4자리 PIN을 입력하세요.</div>
    <div class="err" id="err"></div>
    <div class="dots" id="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="pad" id="pad">
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <button class="fn" data-k="clear">지우기</button><button data-k="0">0</button><button class="fn" data-k="back">←</button>
    </div>
    <div class="foot"><a href="epacific-timeless.html">← 쇼핑몰로 돌아가기</a></div>
  </div>
</div>

<script src="pacific-config.js"></script>
<script src="pacific-admin-auth.js"></script>
<script>
  const $=id=>document.getElementById(id);
  let pin='', busy=false;

  (async()=>{ const u=await PacificAuth.currentUser(); if(u) go(); })();
  function go(){ location.href = new URLSearchParams(location.search).get('next') || 'admin-photos.html'; }
  function showErr(m){ const e=$('err'); e.textContent=m; e.className='err show'; }
  function clearErr(){ $('err').className='err'; }

  function render(){
    [...$('dots').children].forEach((d,i)=>d.className='dot'+(i<pin.length?' filled':''));
  }
  async function submit(){
    busy=true;
    try{ await PacificAuth.login(pin); go(); }
    catch(e){ showErr(e.message); pin=''; render(); busy=false; }
  }
  function press(k){
    if(busy) return; clearErr();
    if(k==='clear'){ pin=''; }
    else if(k==='back'){ pin=pin.slice(0,-1); }
    else if(/\d/.test(k) && pin.length<4){ pin+=k; }
    render();
    if(pin.length===4) submit();
  }
  $('pad').addEventListener('click',e=>{ const b=e.target.closest('button'); if(b) press(b.dataset.k); });
  // 키보드 입력도 허용
  window.addEventListener('keydown',e=>{
    if(e.key>='0'&&e.key<='9') press(e.key);
    else if(e.key==='Backspace') press('back');
  });
</script>
</body>
</html>
