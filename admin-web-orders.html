<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pacific Sports — Web Orders</title>
<style>
  :root{--paper:#fdfdfb;--ink:#1c1c1a;--soft-ink:#4c4a44;--faint:#8b8880;--line:#e7e4dc;--line-2:#d6d2c6;--accent:#3d5a40;--accent-soft:#eef1ec}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Avenir Next','Segoe UI',system-ui,sans-serif;background:#f6f5f1;color:var(--ink);padding:30px 16px}
  .wrap{max-width:1050px;margin:0 auto}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .top a{color:var(--accent);font-size:13.5px;text-decoration:none}
  h1{font-size:24px}
  .sub{color:var(--faint);font-size:14px;margin-bottom:22px}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tabs button{border:1px solid var(--line-2);background:var(--paper);padding:8px 18px;border-radius:999px;cursor:pointer;font-size:13.5px;color:var(--soft-ink)}
  .tabs button.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px}
  .chead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px}
  .ono{font-weight:800;font-size:16px}
  .meta{color:var(--soft-ink);font-size:13.5px}
  .badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px}
  .badge.new{background:#e7eef5;color:#33414f}
  .badge.accepted{background:#fdf3e2;color:#9a6b1f}
  .badge.shipped{background:var(--accent-soft);color:var(--accent)}
  .badge.rejected{background:#f8ecea;color:#a8463f}
  table{width:100%;border-collapse:collapse;font-size:13.5px;margin:8px 0}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
  td{padding:7px 8px;border-bottom:1px solid var(--line)}
  .whb{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .whb.SC{background:#e7eef5;color:#33414f}.whb.CA{background:#fdf3e2;color:#9a6b1f}
  .acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
  .acts button{border:none;padding:9px 16px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600}
  .accept{background:var(--accent);color:#fff}
  .reject{background:#f1efe9;color:var(--soft-ink)}
  .pt{background:#33414f;color:#fff}
  .shiprow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;padding-top:12px;border-top:1px dashed var(--line)}
  .shiprow input{padding:8px 12px;border:1px solid var(--line-2);border-radius:8px;font-size:13.5px;width:220px}
  .shiprow select{padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;font-size:13.5px;background:var(--paper)}
  .shipbtn{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600}
  .shippedinfo{margin-top:10px;background:var(--accent-soft);border-radius:9px;padding:9px 13px;font-size:13.5px;color:var(--accent);font-weight:600}
  .notes{background:var(--accent-soft);border-radius:9px;padding:9px 13px;font-size:13.5px;color:var(--soft-ink);margin-top:6px}
  #msg{padding:30px;text-align:center;color:var(--faint)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Web Orders</h1>
    <a href="epacific-timeless.html">← Back to site</a>
  </div>
  <div class="sub">Orders from the web shop. Print pick tickets, prepare, then enter tracking and mark shipped.</div>
  <div class="tabs">
    <button id="tabNew" class="on">To process</button>
    <button id="tabAll">All</button>
  </div>
  <div id="list"></div>
  <div id="msg">Loading…</div>
</div>

<script src="pacific-config.js"></script>
<script src="pacific-admin-auth.js"></script>
<script>
  const _C=window.PACIFIC_CONFIG||{};
  const URL_=_C.SUPABASE_URL, KEY_=_C.SUPABASE_ANON_KEY;
  const EMAIL_WORKER='https://shop-email.hjbae.workers.dev';
  const SIZE_ORDER=['XS','S','M','L','XL','2XL','3XL','4XL','5XL','6XL'];
  let view='new', rows=[];

  function session(){ try{return JSON.parse(localStorage.getItem('pacific_user')||'null');}catch(e){return null;} }
  function esc(t){ return String(t==null?'':t).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

  async function load(){
    const s=session();
    if(!s||!s.token){
      document.getElementById('msg').innerHTML='Please <a href="epacific-login.html?next='+encodeURIComponent('admin-web-orders.html')+'">log in as staff</a> first.';
      return;
    }
    try{
      const st=await PacificAuth.currentStaff();
      if(!st){ document.getElementById('msg').textContent='This page is for Pacific Sports staff only.'; return; }
    }catch(e){ document.getElementById('msg').textContent='Could not verify staff access.'; return; }
    const r=await fetch(URL_+'/rest/v1/web_orders?select=*&order=created_at.desc',
      {headers:{apikey:KEY_,Authorization:'Bearer '+s.token}});
    if(!r.ok){ document.getElementById('msg').textContent='Could not load web orders ('+r.status+').'; return; }
    rows=await r.json();
    render();
  }

  function itemsTable(items){
    if(!Array.isArray(items)||!items.length) return '<div class="meta">No items.</div>';
    return '<table><thead><tr><th>Style</th><th>Color</th><th>WH</th><th>Size</th><th style="text-align:right">Qty</th></tr></thead><tbody>'+
      items.map(i=>`<tr><td><b>${esc(i.style)}</b></td><td>${esc(i.color)}</td><td><span class="whb ${esc(i.wh)}">${esc(i.wh)}</span></td><td>${esc(i.size)}</td><td style="text-align:right"><b>${i.qty||0}</b></td></tr>`).join('')+
      '</tbody></table>';
  }

  function render(){
    const list=document.getElementById('list'); const msg=document.getElementById('msg');
    const show = view==='new' ? rows.filter(r=>r.status==='new'||r.status==='accepted') : rows;
    if(!show.length){ list.innerHTML=''; msg.style.display='block'; msg.textContent = view==='new' ? 'No web orders to process. 🎉' : 'No web orders yet.'; return; }
    msg.style.display='none';
    list.innerHTML=show.map(r=>{
      const items=Array.isArray(r.items)?r.items:[];
      const hasSC=items.some(i=>i.wh==='SC'), hasCA=items.some(i=>i.wh==='CA');
      const active = r.status==='new'||r.status==='accepted';
      return `
      <div class="card">
        <div class="chead">
          <span class="ono">${esc(r.order_number)}</span>
          <span class="badge ${esc(r.status)}">${esc(r.status)}</span>
          <span class="meta">${esc(r.company_name||'')} · ${esc(r.contact_name||'')} · ${esc(r.email||'')} ${r.phone?('· '+esc(r.phone)):''}</span>
          <span class="meta" style="margin-left:auto">${(r.created_at||'').replace('T',' ').slice(0,16)} · <b>${r.total_pcs||0} pcs</b></span>
        </div>
        ${itemsTable(items)}
        ${r.notes?`<div class="notes">📝 ${esc(r.notes)}</div>`:''}
        <div class="acts">
          ${hasSC?`<button class="pt" data-pt="SC" data-id="${r.id}">🖨 Pick ticket — SC</button>`:''}
          ${hasCA?`<button class="pt" data-pt="CA" data-id="${r.id}">🖨 Pick ticket — CA</button>`:''}
          ${r.status==='new'?`<button data-id="${r.id}" data-act="accepted" style="background:#3d5a40;color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:600">Accept \u2713</button>`:''}
          ${r.status==='new'?`<button class="reject" data-id="${r.id}" data-act="rejected">Reject</button>`:''}
        </div>
        ${active?`
        <div class="shiprow">
          <select id="carrier-${r.id}">
            <option>UPS</option><option>FedEx</option><option>Freight</option><option>Customer pickup</option><option>Other</option>
          </select>
          <input type="text" id="trk-${r.id}" placeholder="Tracking number" value="${esc(r.tracking_number||'')}">
          <button class="shipbtn" data-ship="${r.id}">Mark shipped ✓</button>
        </div>`:''}
        ${r.status==='shipped'?`<div class="shippedinfo">✓ Shipped ${(r.shipped_at||'').replace('T',' ').slice(0,16)} · ${esc(r.carrier||'')} ${esc(r.tracking_number||'')}</div>`:''}
      </div>`;}).join('');
    list.querySelectorAll('button[data-act]').forEach(b=>b.addEventListener('click',()=>setStatus(b.dataset.id,b.dataset.act,{})));
    list.querySelectorAll('button[data-pt]').forEach(b=>b.addEventListener('click',()=>pickTicket(b.dataset.id,b.dataset.pt)));
    list.querySelectorAll('button[data-ship]').forEach(b=>b.addEventListener('click',()=>{
      const id=b.dataset.ship;
      const trk=(document.getElementById('trk-'+id).value||'').trim();
      const carrier=document.getElementById('carrier-'+id).value;
      if(!confirm('Mark this order as shipped?'+(trk?('\nTracking: '+trk):'\n(No tracking number entered)'))) return;
      setStatus(id,'shipped',{tracking_number:trk||null,carrier,shipped_at:new Date().toISOString()});
    }));
  }

  async function setStatus(id,status,extra){
    const s=session(); if(!s){ alert('Session expired.'); return; }
    const body=Object.assign({status},extra||{});
    if(status==='accepted') body.accepted_at=new Date().toISOString();
    const r=await fetch(URL_+'/rest/v1/web_orders?id=eq.'+id,
      {method:'PATCH',headers:{apikey:KEY_,Authorization:'Bearer '+s.token,'Content-Type':'application/json','Prefer':'return=minimal'},
       body:JSON.stringify(body)});
    if(!r.ok){ alert('Could not save ('+r.status+').'); return; }
    const row=rows.find(x=>x.id===id); if(row){ Object.assign(row,body); }
    // 배송 알림 이메일 (실패해도 shipped 상태는 유지)
    if(status==='shipped' && row && row.email && EMAIL_WORKER){
      fetch(EMAIL_WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({type:'shipped',to:row.email,data:{
          order_number:row.order_number,carrier:body.carrier||row.carrier,tracking_number:body.tracking_number||row.tracking_number
        }})}).catch(()=>console.warn('shipped email failed'));
    }
    render();
  }

  // ── 픽티켓: 창고별 스타일×색상 줄, 사이즈 열 ──
  function pickTicket(id,wh){
    const r=rows.find(x=>x.id===id); if(!r) return;
    const items=(Array.isArray(r.items)?r.items:[]).filter(i=>i.wh===wh);
    if(!items.length){ alert('No '+wh+' items on this order.'); return; }
    // 이 창고에 등장하는 사이즈만, 표준 순서로
    const sizes=SIZE_ORDER.filter(s=>items.some(i=>i.size===s));
    // 스타일+색상으로 묶기
    const keys=[]; const map={};
    items.forEach(i=>{
      const k=i.style+'|'+i.color;
      if(!map[k]){ map[k]={style:i.style,styleName:i.styleName||'',color:i.color,q:{}}; keys.push(k); }
      map[k].q[i.size]=(map[k].q[i.size]||0)+(i.qty||0);
    });
    keys.sort();
    let grand=0;
    const rowsHtml=keys.map(k=>{
      const g=map[k]; let rt=0;
      const cells=sizes.map(s=>{ const q=g.q[s]||0; rt+=q; return '<td class="n">'+(q||'')+'</td>'; }).join('');
      grand+=rt;
      return '<tr><td>'+esc(g.style)+'</td><td>'+esc(g.color)+'</td>'+cells+'<td class="n t">'+rt+'</td><td class="chk">☐</td></tr>';
    }).join('');
    const today=new Date().toISOString().slice(0,10);
    const html=`<!doctype html><html><head><meta charset="utf-8"><title>Pick Ticket ${esc(r.order_number)} — ${wh}</title>
<style>
  body{font-family:'Segoe UI',Arial,sans-serif;color:#111;margin:34px}
  .hd{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #111;padding-bottom:12px;margin-bottom:16px}
  .hd h1{font-size:22px;margin:0}
  .hd .wh{font-size:30px;font-weight:900}
  .meta{font-size:13.5px;line-height:1.8;margin-bottom:14px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{border:1px solid #999;padding:8px 9px;text-align:left}
  th{background:#efefef;font-size:11.5px;text-transform:uppercase}
  td.n{text-align:center;width:52px}
  td.t{font-weight:800}
  td.chk{text-align:center;width:46px;font-size:17px}
  .grand{margin-top:10px;text-align:right;font-size:15.5px;font-weight:800}
  .sig{display:flex;gap:40px;margin-top:44px;font-size:13px}
  .sig div{flex:1;border-top:1px solid #111;padding-top:6px}
  .notes{margin-top:12px;border:1px dashed #888;padding:9px 12px;font-size:13px}
  @media print{ .noprint{display:none} }
</style></head><body>
  <div class="hd">
    <div><h1>PACIFIC SPORTS — PICK TICKET</h1>
      <div style="font-size:13px;margin-top:4px">Web Order <b>${esc(r.order_number)}</b> · Printed ${today}</div></div>
    <div class="wh">${wh}</div>
  </div>
  <div class="meta">
    <b>Customer:</b> ${esc(r.company_name||'')} · ${esc(r.contact_name||'')} · ${esc(r.phone||'')}<br>
    <b>Email:</b> ${esc(r.email||'')}
  </div>
  ${r.notes?('<div class="notes">📝 '+esc(r.notes)+'</div>'):''}
  <table>
    <thead><tr><th>Style</th><th>Color</th>${sizes.map(s=>'<th style="text-align:center">'+s+'</th>').join('')}<th style="text-align:center">Total</th><th style="text-align:center">Picked</th></tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table>
  <div class="grand">${wh} Total: ${grand} pcs</div>
  <div class="sig"><div>Picked by / Date</div><div>Checked by / Date</div></div>
  <div class="noprint" style="margin-top:26px"><button onclick="print()" style="padding:10px 26px;font-size:14px">🖨 Print</button></div>
</body></html>`;
    const w=window.open('','_blank');
    if(!w){ alert('Pop-up blocked — allow pop-ups for this site to print pick tickets.'); return; }
    w.document.write(html); w.document.close();
  }

  document.getElementById('tabNew').addEventListener('click',()=>{view='new';tab();render();});
  document.getElementById('tabAll').addEventListener('click',()=>{view='all';tab();render();});
  function tab(){
    document.getElementById('tabNew').classList.toggle('on',view==='new');
    document.getElementById('tabAll').classList.toggle('on',view==='all');
  }
  load();
</script>
</body>
</html>
