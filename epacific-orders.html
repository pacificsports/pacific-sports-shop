<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacific Sports — Order History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbfbf9;--paper:#ffffff;--ink:#1c1c1a;--soft-ink:#56564f;--faint:#8e8e85;
    --line:#e8e7e1;--line-2:#deded6;--accent:#3d5a40;--accent-soft:#eef1ec;--warm:#d9cfbf;
    --display:'Instrument Serif',Georgia,serif;--body:'Geist','Helvetica Neue',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  a{color:inherit;text-decoration:none}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .rise{animation:rise .6s cubic-bezier(.2,.7,.3,1) both}

  .demo-banner{background:var(--accent);color:#fff;text-align:center;padding:10px 20px;font-size:13px}
  .utility{border-bottom:1px solid var(--line);font-size:12.5px;color:var(--soft-ink)}
  .utility-in{max-width:1240px;margin:0 auto;padding:10px 30px;display:flex;justify-content:space-between;align-items:center}
  .utility-in .left{display:flex;gap:20px}
  .utility a{margin-left:18px;transition:color .2s}.utility a:hover{color:var(--ink)}

  header{position:sticky;top:0;z-index:100;background:rgba(251,251,249,.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
  .header-in{max-width:1240px;margin:0 auto;padding:20px 30px;display:flex;align-items:center;gap:46px}
  .logo{font-family:var(--display);font-size:28px;line-height:1;display:flex;align-items:baseline;gap:2px}
  .logo-img{height:40px;width:auto;display:block}
  .fb .logo .logo-img, .footer .logo-img, footer .logo-img{height:34px}

  .logo i{font-style:italic;color:var(--accent)}
  nav.main{display:flex;gap:2px;flex:1}
  .nav-item>a{display:block;padding:10px 16px;font-weight:450;font-size:15px;color:var(--soft-ink);cursor:pointer;border-radius:8px;transition:.2s}
  .nav-item>a:hover{color:var(--ink);background:var(--accent-soft)}
  .h-icons{display:flex;align-items:center;gap:10px}
  .h-icons button{background:none;border:none;cursor:pointer;font-size:14px;font-family:var(--body);font-weight:450;color:var(--soft-ink);padding:9px 12px;border-radius:9px;display:flex;align-items:center;gap:7px;transition:.2s}
  .h-icons button:hover{background:var(--accent-soft);color:var(--ink)}
  .h-icons .primary{background:var(--ink);color:var(--bg)}
  .cart-c{background:var(--accent);color:#fff;border-radius:999px;font-size:11px;font-weight:600;min-width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}

  .crumb{max-width:1080px;margin:0 auto;padding:26px 30px 0;font-size:13px;color:var(--faint)}
  .crumb a:hover{color:var(--ink)}.crumb span{margin:0 8px}

  .page{max-width:1080px;margin:0 auto;padding:18px 30px 90px}
  .phead{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:30px}
  .page h1{font-family:var(--display);font-weight:400;font-size:clamp(38px,5vw,58px);line-height:1}
  .page .sub{color:var(--soft-ink);font-size:16px;font-weight:350;margin-top:6px}
  .search-orders input{font-family:var(--body);font-size:14px;padding:11px 15px;border:1.5px solid var(--line-2);border-radius:10px;background:var(--paper);width:240px}
  .search-orders input:focus{outline:none;border-color:var(--accent)}

  /* order row */
  .order{background:var(--paper);border:1px solid var(--line);border-radius:16px;margin-bottom:16px;overflow:hidden;transition:box-shadow .2s}
  .order:hover{box-shadow:0 16px 40px -28px rgba(28,28,26,.3)}
  .o-head{display:flex;align-items:center;gap:22px;padding:20px 24px;cursor:pointer}
  .o-head .o-id{font-family:var(--display);font-size:21px;min-width:120px}
  .o-meta{flex:1;display:flex;flex-direction:column;gap:3px}
  .o-meta .date{font-size:14px;color:var(--ink)}
  .o-meta .small{font-size:13px;color:var(--faint)}
  .o-status{font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;white-space:nowrap}
  .st-shipped{background:var(--accent-soft);color:var(--accent)}
  .st-processing{background:#f3ecd9;color:#8a6a2a}
  .st-transit{background:#e7eef3;color:#2f5b7a}
  .o-total{font-family:var(--display);font-size:22px;min-width:100px;text-align:right}
  .o-arrow{color:var(--faint);transition:transform .25s;font-size:13px}
  .order.open .o-arrow{transform:rotate(180deg)}

  .o-body{display:none;border-top:1px solid var(--line);padding:8px 24px 20px}
  .order.open .o-body{display:block;animation:rise .4s both}
  .line{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--line)}
  .line:last-of-type{border-bottom:none}
  .line .dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
  .line .lc{font-weight:500;font-size:14px;min-width:84px}
  .line .wh{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
  .wh-SC{background:#e7eef3;color:#2f5b7a}.wh-CA{background:#f1ece0;color:#8a6a3a}
  .line .sizes{flex:1;font-size:13px;color:var(--soft-ink);display:flex;flex-wrap:wrap;gap:3px 11px}
  .line .sizes b{color:var(--ink);font-weight:600}
  .line .lqty{font-family:var(--display);font-size:18px;min-width:48px;text-align:right}
  .line .lamt{font-size:14px;font-weight:600;min-width:84px;text-align:right}
  .o-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:18px}
  .btn-ghost{background:none;border:1.5px solid var(--line-2);color:var(--ink);font-family:var(--body);font-size:14px;font-weight:500;padding:11px 20px;border-radius:10px;cursor:pointer;transition:.2s}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-solid{background:var(--ink);color:var(--bg);border:none;font-family:var(--body);font-size:14px;font-weight:500;padding:11px 22px;border-radius:10px;cursor:pointer;transition:transform .2s,background .25s}
  .btn-solid:hover{transform:translateY(-2px);background:var(--accent)}
  .btn-ghost.sm,.btn-solid.sm{padding:8px 14px;font-size:13px}
  /* 재주문 편집 그리드 */
  .o-edit{display:none}
  .o-edit.show{display:block;animation:rise .4s both;border-top:1px solid var(--line);margin-top:4px;padding-top:16px}
  .edit-head{font-size:13px;color:var(--soft-ink);margin-bottom:12px}
  .etable-wrap{overflow-x:auto;border:1px solid var(--line-2);border-radius:12px}
  .etable{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
  .etable th{background:var(--bg);font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);font-weight:600;padding:10px 6px;text-align:center;border-bottom:1px solid var(--line)}
  .etable th.ecol{text-align:left;padding-left:16px}
  .etable td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line)}
  .etable tr.grp-start td{border-top:2px solid var(--line-2)}
  .etable tbody tr:first-child td{border-top:none}
  .etable tbody tr:last-child td{border-bottom:none}
  .etable td.ec{text-align:left;padding-left:16px;font-weight:500;white-space:nowrap}
  .edot{display:inline-block;width:16px;height:16px;border-radius:50%;vertical-align:-3px;margin-right:8px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
  .stybadge{display:inline-block;font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:5px;padding:2px 6px;margin-right:8px;vertical-align:1px}
  .cw{display:flex;flex-direction:column;align-items:center;gap:2px}
  .etable input{width:46px;text-align:center;font-family:var(--body);font-size:14px;padding:7px 3px;border:1.5px solid var(--line-2);border-radius:8px;background:var(--paper)}
  .etable input:focus{outline:none;border-color:var(--accent)}
  .etable input:disabled{background:#f4f3f0;color:#bbb}
  .stk{font-size:9px;color:var(--faint)}.stk.o{color:#b06a3b;font-weight:600}
  td.is-out .stk{color:#b06a3b}
  .ert{font-family:var(--display);font-size:16px}
  .xrow{background:none;border:none;color:var(--faint);cursor:pointer;font-size:13px;padding:4px;border-radius:5px}
  .xrow:hover{color:#b04a3b;background:#faf0ee}
  .wh{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
  .add-color{position:relative;margin-top:14px}
  .add-pop{display:none;gap:8px;margin-top:10px}
  .add-pop.show{display:flex;flex-wrap:wrap;animation:rise .3s both}
  .add-pop select{font-family:var(--body);font-size:14px;padding:9px 12px;border:1.5px solid var(--line-2);border-radius:9px;background:var(--paper)}
  .edit-foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
  .ef-sum{font-size:14px;color:var(--soft-ink)}.ef-sum b{font-family:var(--display);font-size:18px;color:var(--ink)}
  .edit-foot>div:last-child{display:flex;gap:10px}

  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--bg);padding:15px 26px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;transition:.4s;z-index:200;box-shadow:0 20px 50px -15px rgba(0,0,0,.5)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  footer{border-top:1px solid var(--line);padding:30px;text-align:center;font-size:12px;color:var(--faint);margin-top:40px}

  @media(max-width:780px){
    nav.main{display:none}
    .o-head{flex-wrap:wrap;gap:10px}
    .o-head .o-id{min-width:auto}
    .o-total{min-width:auto}
    .line{flex-wrap:wrap}.line .sizes{order:5;width:100%;padding-left:34px}
  }
</style>
</head>
<body>


<div class="utility">
  <div class="utility-in">
    <div class="left"><span>West Coast — Eastvale, CA</span><span>East Coast — Sumter, SC</span></div>
    <div><a href="#">My Account</a><a href="#">Logout</a></div>
  </div>
</div>

<header>
  <div class="header-in">
    <a href="epacific-timeless.html" class="logo"><img src="logo-pacific.png" alt="Pacific Sports" class="logo-img"></a>
    <nav class="main">
      <div class="nav-item"><a>Men's</a></div>
      <div class="nav-item"><a>Youth & Kids</a></div>
      <div class="nav-item"><a>Collections</a></div>
      <div class="nav-item"><a href="#">Shop by Color</a></div>
      <div class="nav-item"><a href="#">Information</a></div>
    </nav>
    <div class="h-icons">
      <button id="searchBtn">Search</button>
      <div id="searchInline" style="display:none;position:relative;align-items:center">
        <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;opacity:.55">🔍</span>
        <input id="searchInput" type="text" placeholder="Style # or name…" autocomplete="off"
          style="width:250px;border:1px solid var(--line-2);border-radius:999px;padding:9px 32px 9px 32px;font-family:var(--body);font-size:14px;outline:none;background:var(--paper);color:var(--ink);box-shadow:0 1px 3px rgba(28,28,26,.05)">
        <button id="searchClose" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;font-size:17px;cursor:pointer;color:var(--faint);line-height:1">×</button>
        <div id="searchResults" style="display:none;position:absolute;top:calc(100% + 8px);right:0;width:380px;max-height:60vh;overflow:auto;background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:0 20px 50px -18px rgba(28,28,26,.4);padding:6px;z-index:300"></div>
      </div>
      <button class="primary">Cart <span class="cart-c" id="cartCount">0</span></button>
    </div>
  </div>
</header>



<div class="crumb"><a href="#">Home</a><span>/</span><a href="#">My Account</a><span>/</span>Order History</div>

<div class="page">
  <div class="phead rise">
    <div>
      <h1>Order History</h1>
      <div class="sub">Your web orders — amounts, status, and one-click reorder.</div>
    </div>
    <div class="search-orders"><input type="text" id="orderSearch" placeholder="🔍  Search by order # or style…"></div>
  </div>

  <div id="orders"></div>
</div>

<div class="toast" id="toast">✓ Added to cart</div>

<footer>© 2026 Pacific Sports. Demo redesign concept.</footer>

<script>
  // ── 실제 주문 내역 (web_orders 테이블) ──
  const sizeOrder=['2T','3T','4T','5T','XS','S','M','L','XL','2XL','3XL','4XL','5XL'];
  const money=n=>'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const esc=t=>String(t==null?'':t).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  function session(){ try{return JSON.parse(localStorage.getItem('pacific_user')||'null');}catch(e){return null;} }
  async function refreshTok(s){ try{ const rr=await fetch(cfg.SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{apikey:cfg.SUPABASE_ANON_KEY,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:s.refresh})}); if(!rr.ok) return null; const j=await rr.json(); s.token=j.access_token; s.refresh=j.refresh_token; s.expires_at=j.expires_at; localStorage.setItem('pacific_user',JSON.stringify(s)); return s; }catch(e){ return null; } }
  const ordersEl=document.getElementById('orders');
  let orders=[];
  const STATUS_MAP={ new:['processing','Processing'], accepted:['processing','Accepted'], shipped:['shipped','Shipped'], rejected:['processing','Rejected'] };

  // 같은 스타일+색+창고를 한 줄로 묶기
  function groupLines(items){
    const map={}, out=[];
    (items||[]).forEach(i=>{
      const k=i.style+'|'+i.color+'|'+i.wh;
      if(!map[k]){ map[k]={style:i.style,styleName:i.styleName||'',color:i.color,wh:i.wh||'SC',sizes:{},prices:{}}; out.push(map[k]); }
      map[k].sizes[i.size]=(map[k].sizes[i.size]||0)+(i.qty||0);
      if(i.unit_price!=null) map[k].prices[i.size]=Number(i.unit_price);
    });
    return out;
  }
  const lineQty=l=>Object.values(l.sizes).reduce((a,b)=>a+b,0);
  function lineAmt(l){
    let t=0;
    for(const z in l.sizes){ if(l.prices[z]==null) return null; t+=l.sizes[z]*l.prices[z]; }
    return t;
  }
  function orderAmt(o){
    if(o.total_amount!=null) return Number(o.total_amount);
    let t=0; for(const l of o.lines){ const a=lineAmt(l); if(a==null) return null; t+=a; }
    return t;
  }
  const sizesStr=l=>sizeOrder.filter(z=>l.sizes[z]).map(z=>`${z} <b>${l.sizes[z]}</b>`).join('  ');

  function render(list){
    ordersEl.innerHTML='';
    if(!list.length){ ordersEl.innerHTML='<div style="text-align:center;color:var(--faint);padding:60px 0">No orders found.</div>'; return; }
    list.forEach(o=>{
      const div=document.createElement('div');
      div.className='order rise';
      const linesHtml=o.lines.map(l=>{
        const a=lineAmt(l);
        return `
        <div class="line">
          <span class="dot" style="background:#d6d2c6"></span>
          <span class="lc">#${esc(l.style)} ${esc(l.color)}</span>
          <span class="wh wh-${esc(l.wh)}">${esc(l.wh)}</span>
          <span class="sizes">${sizesStr(l)}</span>
          <span class="lqty">${lineQty(l)}</span>
          <span class="lamt">${a!=null?money(a):'—'}</span>
        </div>`;}).join('');
      const amt=orderAmt(o);
      div.innerHTML=`
        <div class="o-head" onclick="this.parentElement.classList.toggle('open')">
          <div class="o-id">${esc(o.id)}</div>
          <div class="o-meta">
            <span class="date">${esc(o.date)}</span>
            <span class="small">${o.lines.length} style${o.lines.length>1?'s':''} · ${o.total_pcs||0} pcs</span>
          </div>
          <span class="o-status st-${o.status}">${esc(o.statusLabel)}</span>
          <div class="o-total">${amt!=null?money(amt):''}</div>
          <span class="o-arrow">▾</span>
        </div>
        <div class="o-body">
          <div class="o-view">
            ${linesHtml}
            ${o.notes?`<div style="font-size:13px;color:var(--soft-ink);padding:8px 0">📝 ${esc(o.notes)}</div>`:''}
            <div class="o-actions">
              <button class="btn-ghost" onclick="location.href='epacific-invoice.html?order=${encodeURIComponent(o.id)}'">View invoice</button>
              <button class="btn-solid" data-reorder="${esc(o.id)}">↻ Reorder</button>
            </div>
          </div>
        </div>`;
      ordersEl.appendChild(div);
    });
    ordersEl.querySelectorAll('button[data-reorder]').forEach(b=>b.addEventListener('click',()=>{
      const o=orders.find(x=>x.id===b.dataset.reorder); if(!o) return;
      if(window.PacificCart){
        window.PacificCart.add(o.items);
        showToast('✓ '+(o.total_pcs||0)+' pcs added to cart');
      }
    }));
  }

  let toastT;
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);
  }

  async function load(){
    const cfg=window.PACIFIC_CONFIG||{};
    const s=session();
    if(!s||!s.token){
      ordersEl.innerHTML='<div style="text-align:center;color:var(--faint);padding:60px 0">🔒 <a href="epacific-login.html?next='+encodeURIComponent('epacific-orders.html')+'" style="color:var(--accent)">Log in</a> to see your order history.</div>';
      return;
    }
    ordersEl.innerHTML='<div style="text-align:center;color:var(--faint);padding:60px 0">Loading…</div>';
    try{
      let r=await fetch(cfg.SUPABASE_URL+'/rest/v1/web_orders?select=*&order=created_at.desc&limit=200',
        {headers:{apikey:cfg.SUPABASE_ANON_KEY,Authorization:'Bearer '+s.token}});
      if(r.status===401 && s && s.refresh){ const ns=await refreshTok(s); if(ns){ r=await fetch(cfg.SUPABASE_URL+'/rest/v1/web_orders?select=*&order=created_at.desc&limit=200',{headers:{apikey:cfg.SUPABASE_ANON_KEY,Authorization:'Bearer '+ns.token}}); } } if(!r.ok) throw new Error(r.status);
      const rows=await r.json();
      orders=rows.map(rw=>{
        const sm=STATUS_MAP[rw.status]||['processing',rw.status||''];
        const items=Array.isArray(rw.items)?rw.items:[];
        return { id:rw.order_number, date:(rw.created_at||'').slice(0,10), status:sm[0], statusLabel:sm[1],
                 total_pcs:rw.total_pcs, total_amount:rw.total_amount, notes:rw.notes, items, lines:groupLines(items) };
      });
      render(orders);
    }catch(e){
      ordersEl.innerHTML='<div style="text-align:center;color:var(--faint);padding:60px 0">Could not load orders. Please try again shortly.</div>';
    }
  }

  document.getElementById('orderSearch').addEventListener('input',e=>{
    const q=e.target.value.trim().toLowerCase();
    render(orders.filter(o=>
      String(o.id).toLowerCase().includes(q) ||
      o.lines.some(l=>String(l.style).includes(q)||String(l.color).toLowerCase().includes(q))
    ));
  });

  document.addEventListener('DOMContentLoaded', load);
</script>

<script src="pacific-config.js"></script>
<script src="pacific-data.js"></script>




<script>
(function(){
  function boot(){
  /* ===== 사이트 검색 (헤더 줄에서 입력칸 확장) ===== */
  (function(){
    const btn=document.getElementById('searchBtn');
    const box=document.getElementById('searchInline');
    const inp=document.getElementById('searchInput');
    const res=document.getElementById('searchResults');
    if(!btn||!box||!inp) return;
    let allStyles=[];
    async function ensureStyles(){
      if(allStyles.length) return;
      try{ allStyles = await PacificData.getStyles(); }catch(e){ allStyles=[]; }
    }
    function openSearch(){
      btn.style.display='none'; box.style.display='inline-flex';
      ensureStyles(); setTimeout(()=>inp.focus(),30);
    }
    function closeSearch(){
      box.style.display='none'; btn.style.display='';
      inp.value=''; res.style.display='none'; res.innerHTML='';
    }
    function render(q){
      q=q.trim().toLowerCase();
      if(!q){ res.style.display='none'; return; }
      const list=allStyles.filter(s=>
        String(s.no).toLowerCase().includes(q) ||
        String(s.desc||'').toLowerCase().includes(q) ||
        String(s.cat||'').toLowerCase().includes(q));
      res.style.display='block';
      if(!list.length){ res.innerHTML='<div style="padding:14px;color:var(--faint);font-size:13.5px">No styles found.</div>'; return; }
      res.innerHTML = list.slice(0,30).map(s=>
        `<a href="epacific-product.html?style=${encodeURIComponent(s.no)}" style="display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;text-decoration:none;color:var(--ink)" onmouseover="this.style.background='var(--accent-soft)'" onmouseout="this.style.background='none'">`+
        `<b style="min-width:50px;font-size:13.5px">#${s.no}</b>`+
        `<span style="font-size:13px;color:var(--soft-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.desc||''}</span></a>`
      ).join('');
    }
    btn.addEventListener('click',openSearch);
    document.getElementById('searchClose').addEventListener('click',closeSearch);
    inp.addEventListener('input',()=>render(inp.value));
    // Enter → 정확히 일치하는 스타일, 없으면 맨 위 결과로 바로 이동
    inp.addEventListener('keydown',e=>{
      if(e.key!=='Enter') return;
      const q=inp.value.trim().toLowerCase(); if(!q) return;
      let target=allStyles.find(s=>String(s.no).toLowerCase()===q);  // 번호 정확 일치
      if(!target){
        const list=allStyles.filter(s=>
          String(s.no).toLowerCase().includes(q) ||
          String(s.desc||'').toLowerCase().includes(q) ||
          String(s.cat||'').toLowerCase().includes(q));
        target=list[0];
      }
      if(target) location.href='epacific-product.html?style='+encodeURIComponent(target.no);
    });
    document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSearch(); });
    // 바깥 클릭하면 결과만 닫기
    document.addEventListener('click',e=>{ if(box.style.display!=='none' && !box.contains(e.target) && e.target!==btn){ res.style.display='none'; } });
  })();
  }
  if(window.PacificData && document.getElementById("searchBtn")) boot();
  else document.addEventListener("DOMContentLoaded",()=>setTimeout(boot,200));
})();
</script>
<script src="pacific-nav.js"></script>
